<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopify MCP Explorer</title>
  <link rel="stylesheet" href="./style.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <header>
      <nav class="tab-bar">
        <button class="tab-btn tab-active" data-tab="storefront">
          <span class="mcp-dot mcp-dot-pending" id="mcp-dot"></span>
          Storefront
        </button>
        <button class="tab-btn" data-tab="checkout">
          <span class="mcp-dot mcp-dot-pending" id="ucp-dot"></span>
          Checkout
        </button>
        <button class="tab-btn" data-tab="debug">Debug</button>
      </nav>
    </header>

    <main>
      <!-- Loading / Not Shopify states (shown across all tabs) -->
      <div id="view-loading" class="state-view">
        <div class="loader-pulse"></div>
        <p>Detecting Shopify store...</p>
      </div>

      <div id="view-empty" class="state-view hidden">
        <h2>Not a Shopify Store</h2>
        <p>Navigate to a Shopify-powered store to use MCP.</p>
      </div>

      <!-- Storefront Tab -->
      <div id="tab-storefront" class="tab-content hidden">
        <section class="section">
          <div class="mcp-status-card">
            <div class="mcp-status-row">
              <span class="mcp-dot mcp-dot-pending" id="mcp-dot-content"></span>
              <span id="mcp-status-text">Checking...</span>
            </div>
            <div id="mcp-server-info" class="mcp-server-info hidden"></div>
          </div>
          <div id="mcp-tools-list" class="mcp-tools-list hidden">
            <label class="eyebrow" style="margin-top:16px;">TOOLS</label>
            <div id="mcp-tools-cloud" class="cloud-wrap"></div>
          </div>
        </section>

        <!-- Search -->
        <section class="section" id="mcp-search-section" style="display:none;">
          <label class="eyebrow">SEARCH CATALOG</label>
          <div class="mcp-input-group">
            <input type="text" id="mcp-search-query" class="mcp-input" placeholder="e.g. boots, gift under $50...">
            <button id="mcp-search-btn" class="action-link">Search</button>
          </div>
          <div id="mcp-search-results" class="mcp-results"></div>
        </section>

        <!-- Policies -->
        <section class="section" id="mcp-policy-section" style="display:none;">
          <label class="eyebrow">STORE POLICIES & FAQ</label>
          <div class="mcp-input-group">
            <input type="text" id="mcp-policy-query" class="mcp-input" placeholder="e.g. return policy, shipping...">
            <button id="mcp-policy-btn" class="action-link">Ask</button>
          </div>
          <div id="mcp-policy-results" class="mcp-results"></div>
        </section>

        <!-- Cart -->
        <section class="section" id="mcp-cart-section" style="display:none;">
          <label class="eyebrow">CART</label>
          <div id="mcp-cart-content" class="mcp-cart-content">
            <p class="mcp-hint">Add items from search results to test the cart flow.</p>
          </div>
        </section>
      </div>

      <!-- Checkout Tab -->
      <div id="tab-checkout" class="tab-content hidden">
        <section class="section">
          <div class="mcp-status-card">
            <div class="mcp-status-row">
              <span class="mcp-dot mcp-dot-pending" id="ucp-dot-content"></span>
              <span id="ucp-status-text">Checking...</span>
            </div>
            <div id="ucp-server-info" class="mcp-server-info hidden"></div>
          </div>
          <div id="ucp-tools-list" class="mcp-tools-list hidden">
            <div id="ucp-tools-cloud" class="cloud-wrap"></div>
          </div>
        </section>
      </div>

      <!-- Debug Tab -->
      <div id="tab-debug" class="tab-content hidden">
        <div class="debug-header">
          <label class="eyebrow">MCP CALL LOG</label>
          <button id="debug-clear-btn" class="mcp-btn-sm">Clear</button>
        </div>
        <div id="debug-log" class="debug-log">
          <p class="mcp-hint">MCP calls will appear here as they are made.</p>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
